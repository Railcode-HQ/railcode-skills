# daily-metrics-report — a scheduled reporting agent: run a saved query, email the summary.
#
# The schedule is a SEPARATE resource, not a manifest key. After creating the agent, attach it:
#   railcode agent schedule set daily-metrics-report --cron "0 9 * * *" --timezone America/New_York
#
# A cron run always passes NULL input, and a `type: object` input_schema would reject null and
# 422 every tick — so this agent deliberately declares no input_schema.
# Reference-annotated writeup: ../references/examples.md.
kind: agent
name: daily-metrics-report
description: Email a short daily summary of yesterday's key product metrics.
model: anthropic/claude-opus-4-8   # copy the exact `model` column from `railcode llm models`
system: |
  Each run: call the "daily_active_users" saved query for yesterday, then send exactly one
  email to the team summarizing the numbers and any notable change vs. the prior day. Keep it
  to a short subject and a few sentences plus a compact table. If the query returns no rows,
  say so in the email rather than inventing figures.
tools:
  saved_queries:
    - daily_active_users     # a ratified saved query in your org (manage via $manage-railcode-org)
  email:
    domains:
      - yourcompany.com      # recipients restricted to this domain; add `emails:` for exact addresses
limits:
  max_steps: 8
  timeout_seconds: 60
  max_tokens_total: 20000
  max_tokens_turn: 4096
