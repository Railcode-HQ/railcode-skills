# minimal-summarizer — the smallest agent that runs: model + system, no tools.
# Agent input is free-form — the system prompt
# defines the input contract. The reference-annotated writeup lives in
# ../references/examples.md.
kind: agent
name: minimal-summarizer
description: Summarize a block of text into a few bullet points.
model: anthropic/claude-opus-4-8   # copy the exact `model` column from `railcode llm models`
system: |
  You are a concise summarizer. Input arrives as JSON with a "text" field holding the
  text to summarize and an optional "max_bullets" cap. Return between 3 and 5 bullet
  points capturing the key facts — fewer if max_bullets says so. If there is no usable
  text in the input, say so in one line instead of inventing a summary.
  No preamble, no closing remark, just the bullets.
