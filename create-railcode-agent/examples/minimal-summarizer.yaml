# minimal-summarizer — the smallest agent that runs: model + system + typed input, no tools.
# The reference-annotated writeup lives in ../references/examples.md.
kind: agent
name: minimal-summarizer
description: Summarize a block of text into a few bullet points.
model: anthropic/claude-opus-4-8   # copy the exact `model` column from `railcode llm models`
system: |
  You are a concise summarizer. Given the user's text, return between 3 and 5
  bullet points capturing the key facts — fewer if the caller sets max_bullets.
  No preamble, no closing remark, just the bullets.
input_schema:
  type: object
  additionalProperties: false
  required: [text]
  properties:
    text:
      type: string
      description: The text to summarize.
    max_bullets:
      type: integer
      description: Optional cap on the number of bullets (default 5).
